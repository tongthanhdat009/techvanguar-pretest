name: Deploy VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, bcmath, ctype, fileinfo, intl, openssl, pdo, pdo_sqlite, pdo_mysql
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Prepare Laravel environment
        run: |
          cp .env.example .env
          php artisan key:generate --force
          php artisan jwt:secret --force
          mkdir -p database
          touch database/database.sqlite

      - name: Install frontend dependencies
        run: npm ci

      # TODO: Add tests later - uncomment when ready
      # - name: Run automated tests
      #   env:
      #     APP_ENV: testing
      #     DB_CONNECTION: sqlite
      #     DB_DATABASE: database/database.sqlite
      #     CACHE_STORE: array
      #     QUEUE_CONNECTION: sync
      #     SESSION_DRIVER: array
      #   run: php artisan test

      - name: Build frontend assets
        run: npm run build

      - name: Package release bundle
        run: |
          # Wait a moment for any pending file operations
          sleep 2

          # Use tar with --ignore-failed-read to handle transient file changes
          tar \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='vendor' \
            --exclude='tests' \
            --exclude='storage/logs/*' \
            --exclude='storage/framework/cache/*' \
            --exclude='storage/framework/sessions/*' \
            --exclude='storage/framework/views/*' \
            --ignore-failed-read \
            -czf release.tar.gz .

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: laravel-release
          path: release.tar.gz
          if-no-files-found: error
          retention-days: 7

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    environment: production

    env:
      APP_NAME: flashcard-learning-hub

    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: laravel-release
          path: .

      - name: Prepare remote directories
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -eu
            BASE_DIR="${{ secrets.VPS_APP_DIR }}"
            mkdir -p "$BASE_DIR/releases" "$BASE_DIR/shared/storage/app" "$BASE_DIR/shared/storage/framework/cache" "$BASE_DIR/shared/storage/framework/sessions" "$BASE_DIR/shared/storage/framework/views" "$BASE_DIR/shared/storage/logs"
            mkdir -p "$BASE_DIR/shared/bootstrap/cache"

            if [ ! -f "$BASE_DIR/shared/.env" ]; then
              echo "❌ Missing shared env file at $BASE_DIR/shared/.env"
              echo "Please create it first:"
              echo "  sudo nano $BASE_DIR/shared/.env"
              exit 1
            fi

            # Ensure PHP-FPM is installed
            if ! dpkg -l | grep -q php.*-fpm; then
              echo "❌ PHP-FPM is not installed. Please install it first:"
              echo "  sudo apt install php8.2-fpm -y"
              exit 1
            fi

            # Ensure Composer is installed
            if ! command -v composer >/dev/null 2>&1; then
              echo "📦 Installing Composer..."
              php -r "copy('https://getcomposer.org/installer', 'composer-setup.php');"
              php composer-setup.php --quiet --install-dir=/usr/local/bin --filename=composer
              php -r "unlink('composer-setup.php');"
            fi

            echo "✓ Remote directories prepared"
            echo "✓ PHP-FPM is installed"
            echo "✓ Composer is installed"

      - name: Upload release archive
        uses: burnett01/rsync-deployments@v8
        with:
          switches: -avzr
          path: release.tar.gz
          remote_path: ${{ secrets.VPS_APP_DIR }}/releases/${{ github.sha }}/
          remote_host: ${{ secrets.VPS_HOST }}
          remote_user: ${{ secrets.VPS_USER }}
          remote_key: ${{ secrets.VPS_SSH_KEY }}
          remote_port: ${{ secrets.VPS_PORT || 22 }}

      - name: Deploy Nginx config
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -eu
            APP_NAME="${{ env.APP_NAME }}"
            BASE_DIR="${{ secrets.VPS_APP_DIR }}"
            RELEASE_DIR="$BASE_DIR/releases/${{ github.sha }}"
            NGINX_SOURCE="$RELEASE_DIR/.github/workflows/nginx/flashcard-learning-hub.conf"
            NGINX_TARGET="/etc/nginx/sites-available/$APP_NAME"
            NGINX_ENABLED="/etc/nginx/sites-enabled/$APP_NAME"

            # Deploy Nginx config if it exists
            if [ -f "$NGINX_SOURCE" ]; then
              echo "📋 Deploying Nginx configuration..."
              sudo cp "$NGINX_SOURCE" "$NGINX_TARGET"

              # Create symlink to sites-enabled if not exists
              if [ ! -L "$NGINX_ENABLED" ]; then
                sudo ln -sf "$NGINX_TARGET" "$NGINX_ENABLED"
                echo "✓ Created symlink: $NGINX_ENABLED"
              fi

              # Verify Nginx config
              if sudo nginx -t; then
                echo "✓ Nginx config is valid"
              else
                echo "❌ Nginx config test failed"
                exit 1
              fi
            else
              echo "⚠️  Warning: Nginx config not found at $NGINX_SOURCE"
            fi

      - name: Deploy release on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -eu

            APP_NAME="${{ env.APP_NAME }}"
            BASE_DIR="${{ secrets.VPS_APP_DIR }}"
            RELEASE_DIR="$BASE_DIR/releases/${{ github.sha }}"
            CURRENT_DIR="$BASE_DIR/current"
            SHARED_DIR="$BASE_DIR/shared"

            # Detect PHP version
            PHP_VERSION=$(php -r 'echo PHP_MAJOR_VERSION . "." . PHP_MINOR_VERSION;')
            PHP_FPM_SERVICE="php${PHP_VERSION}-fpm"
            PHP_FPM_SOCKET="/var/run/php/php${PHP_VERSION}-fpm.sock"

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "📦 Deploying: $APP_NAME"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "PHP Version: $PHP_VERSION"
            echo "PHP-FPM Service: $PHP_FPM_SERVICE"
            echo "Release Directory: $RELEASE_DIR"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            cd "$RELEASE_DIR"
            tar -xzf release.tar.gz
            rm -f release.tar.gz

            # Setup symlinks to shared directories
            rm -rf storage bootstrap/cache
            ln -sfn "$SHARED_DIR/storage" "$RELEASE_DIR/storage"
            ln -sfn "$SHARED_DIR/bootstrap/cache" "$RELEASE_DIR/bootstrap/cache"
            ln -sfn "$SHARED_DIR/.env" "$RELEASE_DIR/.env"
            echo "✓ Symlinks created"

            # Install dependencies
            echo "📚 Installing Composer dependencies..."
            composer install --no-dev --optimize-autoloader --no-interaction

            # Run Laravel commands
            echo "🔧 Running Laravel optimizations..."
            php artisan storage:link || true
            php artisan migrate --force
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            echo "✓ Laravel optimizations completed"

            # Update current symlink
            ln -sfn "$RELEASE_DIR" "$CURRENT_DIR"
            cd "$CURRENT_DIR"
            echo "✓ Current symlink updated"

            # Set proper permissions
            echo "🔐 Setting permissions..."
            sudo chown -R www-data:www-data storage bootstrap/cache || true
            sudo chmod -R 775 storage bootstrap/cache || true
            echo "✓ Permissions set"

            # Restart PHP-FPM to clear opcache
            echo "🔄 Restarting PHP-FPM..."
            sudo systemctl restart "$PHP_FPM_SERVICE"
            echo "✓ PHP-FPM restarted"

            # Reload Nginx
            echo "🔄 Reloading Nginx..."
            sudo nginx -t
            sudo systemctl reload nginx
            echo "✓ Nginx reloaded"

            # Setup/Restart queue worker with supervisor
            if ! command -v supervisor >/dev/null 2>&1; then
              echo "📦 Installing supervisor..."
              sudo apt install supervisor -y
            fi

            # Create supervisor config for queue worker
            echo "📋 Setting up queue worker..."
            cat <<EOF | sudo tee /etc/supervisor/conf.d/${APP_NAME}-queue.conf > /dev/null
            [program:${APP_NAME}-queue]
            process_name=%(program_name)s_%(process_num)02d
            command=php ${CURRENT_DIR}/artisan queue:work --sleep=3 --tries=3 --max-time=3600
            autostart=true
            autorestart=true
            user=www-data
            redirect_stderr=true
            stdout_logfile=${CURRENT_DIR}/storage/logs/queue.log
            stopwaitsecs=3600
            EOF

            # Update supervisor and restart queue
            sudo supervisorctl reread
            sudo supervisorctl update
            sudo supervisorctl restart "${APP_NAME}-queue:*" || true
            echo "✓ Queue worker restarted"

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "✅ Deployment completed successfully!"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "✓ PHP-FPM restarted: $PHP_FPM_SERVICE"
            echo "✓ Nginx reloaded"
            echo "✓ Queue worker restarted"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            # Cleanup old releases (keep 5 most recent)
            cd "$BASE_DIR/releases"
            ls -1dt */ | tail -n +6 | xargs -r rm -rf
            echo "🧹 Cleaned up old releases"

      - name: Health check
        run: |
          echo "⏳ Waiting for application to be ready..."
          sleep 5

          # Health check endpoint
          MAX_ATTEMPTS=10
          ATTEMPT=0
          APP_URL="https://flashcard.jadt-airline.io.vn"

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$APP_URL" || echo "000")

            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "302" ]; then
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "✅ Application is healthy! (HTTP $HTTP_CODE)"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "🌐 URL: $APP_URL"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              exit 0
            fi

            ATTEMPT=$((ATTEMPT + 1))
            echo "Attempt $ATTEMPT/$MAX_ATTEMPTS: HTTP $HTTP_CODE - Retrying in 5s..."
            sleep 5
          done

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "❌ Health check failed after $MAX_ATTEMPTS attempts"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          exit 1
