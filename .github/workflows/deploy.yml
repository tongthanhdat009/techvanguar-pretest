name: Deploy VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, bcmath, ctype, fileinfo, intl, openssl, pdo, pdo_sqlite, pdo_mysql
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Prepare Laravel environment
        run: |
          cp .env.example .env
          php artisan key:generate --force
          php artisan jwt:secret --force
          mkdir -p database
          touch database/database.sqlite

      - name: Install frontend dependencies
        run: npm ci

      - name: Run automated tests
        env:
          APP_ENV: testing
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
          CACHE_STORE: array
          QUEUE_CONNECTION: sync
          SESSION_DRIVER: array
        run: php artisan test

      - name: Build frontend assets
        run: npm run build

      - name: Package release bundle
        run: |
          tar \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='vendor' \
            --exclude='tests' \
            --exclude='storage/logs/*' \
            --exclude='storage/framework/cache/*' \
            --exclude='storage/framework/sessions/*' \
            --exclude='storage/framework/views/*' \
            -czf release.tar.gz .

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: laravel-release
          path: release.tar.gz
          if-no-files-found: error
          retention-days: 7

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest

    env:
      APP_NAME: flashcard-learning-hub
      APP_PORT: '8000'

    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: laravel-release
          path: .

      - name: Prepare remote directories
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -eu
            BASE_DIR="${{ secrets.VPS_APP_DIR }}"
            mkdir -p "$BASE_DIR/releases" "$BASE_DIR/shared/storage/app" "$BASE_DIR/shared/storage/framework/cache" "$BASE_DIR/shared/storage/framework/sessions" "$BASE_DIR/shared/storage/framework/views" "$BASE_DIR/shared/storage/logs"
            mkdir -p "$BASE_DIR/shared/bootstrap/cache"

            if [ ! -f "$BASE_DIR/shared/.env" ]; then
              echo "Missing shared env file at $BASE_DIR/shared/.env"
              exit 1
            fi

            if ! command -v pm2 >/dev/null 2>&1; then
              sudo npm install -g pm2
            fi

      - name: Upload release archive
        uses: burnett01/rsync-deployments@v8
        with:
          switches: -avzr
          path: release.tar.gz
          remote_path: ${{ secrets.VPS_APP_DIR }}/releases/${{ github.sha }}/
          remote_host: ${{ secrets.VPS_HOST }}
          remote_user: ${{ secrets.VPS_USER }}
          remote_key: ${{ secrets.VPS_SSH_KEY }}
          remote_port: ${{ secrets.VPS_PORT || 22 }}

      - name: Deploy release on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -eu

            APP_NAME="${{ env.APP_NAME }}"
            APP_PORT="${{ env.APP_PORT }}"
            BASE_DIR="${{ secrets.VPS_APP_DIR }}"
            RELEASE_DIR="$BASE_DIR/releases/${{ github.sha }}"
            CURRENT_DIR="$BASE_DIR/current"
            SHARED_DIR="$BASE_DIR/shared"
            PM2_SERVICE_NAME="pm2-${USER}"
            PM2_BIN="$(command -v pm2)"
            LEGACY_SYSTEMD_SERVICE="${APP_NAME}.service"

            cd "$RELEASE_DIR"
            tar -xzf release.tar.gz
            rm -f release.tar.gz

            rm -rf storage bootstrap/cache
            ln -sfn "$SHARED_DIR/storage" "$RELEASE_DIR/storage"
            ln -sfn "$SHARED_DIR/bootstrap/cache" "$RELEASE_DIR/bootstrap/cache"
            ln -sfn "$SHARED_DIR/.env" "$RELEASE_DIR/.env"

            composer install --no-dev --optimize-autoloader --no-interaction

            php artisan storage:link || true
            php artisan migrate --force
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            ln -sfn "$RELEASE_DIR" "$CURRENT_DIR"
            cd "$CURRENT_DIR"

            pm2 delete "$APP_NAME" || true
            pm2 start ecosystem.config.cjs --only "$APP_NAME" --update-env
            pm2 save --force

            sudo systemctl stop "$LEGACY_SYSTEMD_SERVICE" || true
            sudo systemctl disable "$LEGACY_SYSTEMD_SERVICE" || true
            sudo rm -f "/etc/systemd/system/$LEGACY_SYSTEMD_SERVICE"

            sudo env PATH="$PATH" "$PM2_BIN" unstartup systemd -u "$USER" --hp "$HOME" || true
            sudo systemctl stop "$PM2_SERVICE_NAME" || true
            sudo systemctl disable "$PM2_SERVICE_NAME" || true
            sudo rm -f "/etc/systemd/system/$PM2_SERVICE_NAME.service"
            sudo systemctl daemon-reload

            sudo env PATH="$PATH" "$PM2_BIN" startup systemd -u "$USER" --hp "$HOME"
            pm2 save --force

            sudo systemctl daemon-reload
            sudo systemctl enable "$PM2_SERVICE_NAME"
            sudo systemctl restart "$PM2_SERVICE_NAME"

            if ! pm2 describe "$APP_NAME" >/dev/null 2>&1; then
              echo "PM2 process was not created"
              exit 1
            fi

            sudo nginx -t
            sudo systemctl reload nginx

            cd "$BASE_DIR/releases"
            ls -1dt */ | tail -n +6 | xargs -r rm -rf

  